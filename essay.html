<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mustaqil Ish / Referat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            padding-bottom: 140px;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 8px;
        }
        .header h1 { font-size: 18px; font-weight: 700; }

        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            opacity: 0.55;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--tg-theme-hint-color, #c0c0c0);
            border-radius: 10px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000000);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--tg-theme-button-color, #0088cc);
        }
        .form-group input::placeholder { opacity: 0.4; }
        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: '▾';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            font-size: 16px;
            opacity: 0.5;
        }
        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }

        /* Bottom buttons */
        .bottom-btns {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            display: flex;
            flex-direction: column;
            gap: 0;
            z-index: 100;
        }
        .continue-btn {
            padding: 15px 20px;
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }
        .continue-btn:active { opacity: 0.85; }
        .save-only-btn {
            padding: 11px 20px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-hint-color, #888);
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            border-top: 1px solid rgba(0,0,0,0.08);
        }
        .save-only-btn:active { opacity: 0.7; }

        /* Loading overlay */
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .loading-overlay.active { display: flex; }
        .loading-box {
            background: var(--tg-theme-bg-color, #fff);
            border-radius: 16px;
            padding: 28px 32px;
            text-align: center;
            max-width: 280px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }
        .loading-spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(0,136,204,0.2);
            border-top-color: var(--tg-theme-button-color, #0088cc);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .loading-subtitle {
            font-size: 13px;
            opacity: 0.55;
            line-height: 1.5;
        }
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }

        .footer-note {
            text-align: center;
            font-size: 12px;
            opacity: 0.3;
            margin-top: 16px;
        }

        /* Disabled state */
        body.sending .form-group input,
        body.sending .form-group select {
            pointer-events: none;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="header">
    <h1 id="page-title">📝 Ma'lumotlar</h1>
</div>

<div class="form-group">
    <label id="lbl-author">Muallif (Ism Familya)</label>
    <input type="text" id="author" placeholder="Nodir Karimov" autocomplete="off">
</div>

<div class="form-group">
    <label id="lbl-university">Oliygoh nomi</label>
    <input type="text" id="university" placeholder="Termiz davlat universiteti" autocomplete="off">
</div>

<div class="form-group">
    <label id="lbl-direction">Yo'nalish</label>
    <input type="text" id="direction" placeholder="Amaliy matematika va informatika" autocomplete="off">
</div>

<div class="row">
    <div class="form-group">
        <label id="lbl-course">Kurs</label>
        <div class="select-wrapper">
            <select id="course">
                <option value="">—</option>
                <option value="1">1-kurs</option>
                <option value="2">2-kurs</option>
                <option value="3">3-kurs</option>
                <option value="4">4-kurs</option>
                <option value="5">5-kurs</option>
                <option value="6">6-kurs</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label id="lbl-lang">Til</label>
        <div class="select-wrapper">
            <select id="language">
                <option value="uz">O'zbek</option>
                <option value="ru">Русский</option>
                <option value="en">English</option>
            </select>
        </div>
    </div>
</div>

<div class="form-group">
    <label id="lbl-subject">Fan nomi</label>
    <input type="text" id="subject" placeholder="Informatika" autocomplete="off">
</div>

<div class="form-group">
    <label id="lbl-pages">Sahifa miqdori</label>
    <div class="select-wrapper">
        <select id="pages">
            <option value="10-15|3000">10-15 Sahifa — 3,000 So'm</option>
            <option value="15-20|4000">15-20 Sahifa — 4,000 So'm</option>
            <option value="20-25|5000">20-25 Sahifa — 5,000 So'm</option>
            <option value="25-30|6000">25-30 Sahifa — 6,000 So'm</option>
            <option value="30-35|6000">30-35 Sahifa — 6,000 So'm</option>
            <option value="35-40|6000">35-40 Sahifa — 6,000 So'm</option>
            <option value="40-45|7000">40-45 Sahifa — 7,000 So'm</option>
        </select>
    </div>
</div>

<div class="footer-note">@aivazifachi_bot</div>

<!-- Bottom buttons -->
<div class="bottom-btns" id="bottom-btns">
    <button class="continue-btn" id="continue-btn">▶ Davom etish (AI reja tuzadi)</button>
    <button class="save-only-btn" id="save-btn">💾 Faqat saqlash</button>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loading-overlay">
    <div class="loading-box">
        <div class="loading-spinner"></div>
        <div class="loading-title" id="loading-title">AI reja tuzmoqda</div>
        <div class="loading-subtitle" id="loading-subtitle">Bir necha soniya kuting<span class="loading-dots"></span></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.MainButton.hide();

    const urlParams = new URLSearchParams(window.location.search);
    const docType = urlParams.get('type') || 'mustaqil_ish';
    const userLang = urlParams.get('lang') || 'uz';

    // Til bo'yicha matnlar
    const texts = {
        uz: {
            title_mustaqil: "📝 Mustaqil Ish Ma'lumotlari",
            title_referat: "📄 Referat Ma'lumotlari",
            continue_btn: "▶ Davom etish (AI reja tuzadi)",
            save_btn: "💾 Faqat saqlash",
            loading_title: "AI reja tuzmoqda",
            loading_sub: "Bir necha soniya kuting",
            lbl_author: "Muallif (Ism Familya)",
            lbl_university: "Oliygoh nomi",
            lbl_direction: "Yo'nalish",
            lbl_course: "Kurs",
            lbl_lang: "Til",
            lbl_subject: "Fan nomi",
            lbl_pages: "Sahifa miqdori",
        },
        ru: {
            title_mustaqil: "📝 Самостоятельная работа",
            title_referat: "📄 Реферат",
            continue_btn: "▶ Продолжить (ИИ составит план)",
            save_btn: "💾 Только сохранить",
            loading_title: "ИИ составляет план",
            loading_sub: "Подождите несколько секунд",
            lbl_author: "Автор (Имя Фамилия)",
            lbl_university: "Название вуза",
            lbl_direction: "Направление",
            lbl_course: "Курс",
            lbl_lang: "Язык",
            lbl_subject: "Предмет",
            lbl_pages: "Количество страниц",
        },
        en: {
            title_mustaqil: "📝 Independent Work",
            title_referat: "📄 Abstract",
            continue_btn: "▶ Continue (AI will create plan)",
            save_btn: "💾 Save only",
            loading_title: "AI is creating plan",
            loading_sub: "Please wait a few seconds",
            lbl_author: "Author (Name Surname)",
            lbl_university: "University name",
            lbl_direction: "Direction",
            lbl_course: "Course",
            lbl_lang: "Language",
            lbl_subject: "Subject",
            lbl_pages: "Page count",
        }
    };

    const lang = ['ru','en'].includes(userLang) ? userLang : 'uz';
    const T = texts[lang] || texts.uz;

    // Matnlarni o'rnatish
    document.getElementById('page-title').textContent =
        docType === 'referat' ? T.title_referat : T.title_mustaqil;
    document.getElementById('continue-btn').textContent = T.continue_btn;
    document.getElementById('save-btn').textContent = T.save_btn;
    document.getElementById('loading-title').textContent = T.loading_title;
    document.getElementById('loading-subtitle').innerHTML = T.loading_sub + '<span class="loading-dots"></span>';
    document.getElementById('lbl-author').textContent = T.lbl_author;
    document.getElementById('lbl-university').textContent = T.lbl_university;
    document.getElementById('lbl-direction').textContent = T.lbl_direction;
    document.getElementById('lbl-course').textContent = T.lbl_course;
    document.getElementById('lbl-lang').textContent = T.lbl_lang;
    document.getElementById('lbl-subject').textContent = T.lbl_subject;
    document.getElementById('lbl-pages').textContent = T.lbl_pages;

    // Til selectini o'rnatish
    document.getElementById('language').value = lang;

    // Saqlangan ma'lumotlarni yuklash
    try {
        const saved = JSON.parse(localStorage.getItem('essay_user_data') || '{}');
        if (saved.author) document.getElementById('author').value = saved.author;
        if (saved.university) document.getElementById('university').value = saved.university;
        if (saved.direction) document.getElementById('direction').value = saved.direction;
        if (saved.course) document.getElementById('course').value = saved.course;
        if (saved.subject) document.getElementById('subject').value = saved.subject;
        if (saved.pages) document.getElementById('pages').value = saved.pages;
    } catch(e) {}

    function toNameCase(str) {
        if (!str) return str;
        return str.split(' ').map(w => w ? w[0].toUpperCase() + w.slice(1).toLowerCase() : '').join(' ');
    }
    function toTitleCase(str) {
        return str ? str[0].toUpperCase() + str.slice(1) : str;
    }

    function collectData(withContinue) {
        const author = document.getElementById('author').value.trim();
        const university = document.getElementById('university').value.trim();
        const direction = document.getElementById('direction').value.trim();
        const course = document.getElementById('course').value;
        const subject = document.getElementById('subject').value.trim();
        const language = document.getElementById('language').value;
        const pagesVal = document.getElementById('pages').value;
        const [pageRange, price] = pagesVal.split('|');

        // LocalStorage ga saqlash
        try {
            localStorage.setItem('essay_user_data', JSON.stringify(
                { author, university, direction, course, subject, pages: pagesVal }
            ));
        } catch(e) {}

        return {
            type: docType,
            author: toNameCase(author),
            university: toTitleCase(university),
            direction: toTitleCase(direction),
            course: course || '',
            subject: toTitleCase(subject),
            language: language,
            page_range: pageRange,
            price: parseInt(price),
            continue: withContinue  // true = AI reja tuzib xulosani ko'rsat
        };
    }

    function showLoading() {
        // Tugmalarni o'chirish
        document.getElementById('bottom-btns').style.display = 'none';
        document.body.classList.add('sending');
        // Loading overlay ko'rsatish
        document.getElementById('loading-overlay').classList.add('active');
    }

    // "Davom etish" - continue=true bilan yuborish
    document.getElementById('continue-btn').addEventListener('click', function() {
        showLoading();
        const data = collectData(true);
        // Kichik delay - animatsiya ko'rinishi uchun
        setTimeout(() => {
            tg.sendData(JSON.stringify(data));
            // tg.close() - bot o'zi yopadi yoki foydalanuvchi orqaga bosadi
        }, 300);
    });

    // "Faqat saqlash" - continue=false bilan yuborish
    document.getElementById('save-btn').addEventListener('click', function() {
        const data = collectData(false);
        tg.sendData(JSON.stringify(data));
        tg.close();
    });
</script>
</body>
</html>
