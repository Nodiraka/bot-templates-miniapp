<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mustaqil Ish / Referat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            padding-bottom: 80px;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 8px;
        }
        .header h1 { font-size: 18px; font-weight: 700; }

        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            opacity: 0.55;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--tg-theme-hint-color, #c0c0c0);
            border-radius: 10px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000000);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--tg-theme-button-color, #0088cc);
        }
        .form-group input::placeholder { opacity: 0.4; }
        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: '▾';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            font-size: 16px;
            opacity: 0.5;
        }
        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }
        .save-btn {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 15px 20px;
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            z-index: 100;
        }
        .save-btn:active { opacity: 0.85; }
        .footer-note {
            text-align: center;
            font-size: 12px;
            opacity: 0.3;
            margin-top: 16px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1 id="page-title">📝 Ma'lumotlar</h1>
</div>

<div class="form-group">
    <label>Muallif (Ism Familya)</label>
    <input type="text" id="author" placeholder="Nodir Karimov" autocomplete="off">
</div>

<div class="form-group">
    <label>Oliygoh nomi</label>
    <input type="text" id="university" placeholder="Termiz davlat universiteti" autocomplete="off">
</div>

<div class="form-group">
    <label>Yo'nalish</label>
    <input type="text" id="direction" placeholder="Amaliy matematika va informatika" autocomplete="off">
</div>

<div class="row">
    <div class="form-group">
        <label>Kurs</label>
        <div class="select-wrapper">
            <select id="course">
                <option value="">—</option>
                <option value="1">1-kurs</option>
                <option value="2">2-kurs</option>
                <option value="3">3-kurs</option>
                <option value="4">4-kurs</option>
                <option value="5">5-kurs</option>
                <option value="6">6-kurs</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label>Til</label>
        <div class="select-wrapper">
            <select id="language">
                <option value="uz">O'zbek</option>
                <option value="ru">Русский</option>
                <option value="en">English</option>
            </select>
        </div>
    </div>
</div>

<div class="form-group">
    <label>Fan nomi</label>
    <input type="text" id="subject" placeholder="Informatika" autocomplete="off">
</div>

<div class="form-group">
    <label>Sahifa miqdori</label>
    <div class="select-wrapper">
        <select id="pages">
            <option value="10-15|3000">10-15 Sahifa — 3,000 So'm</option>
            <option value="15-20|4000">15-20 Sahifa — 4,000 So'm</option>
            <option value="20-25|5000">20-25 Sahifa — 5,000 So'm</option>
            <option value="25-30|6000">25-30 Sahifa — 6,000 So'm</option>
            <option value="30-35|6000">30-35 Sahifa — 6,000 So'm</option>
            <option value="35-40|6000">35-40 Sahifa — 6,000 So'm</option>
            <option value="40-45|7000">40-45 Sahifa — 7,000 So'm</option>
        </select>
    </div>
</div>

<div class="footer-note">@aivazifachi_bot</div>

<button class="save-btn" id="save-btn">💾 Saqlash</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.MainButton.hide();

    const urlParams = new URLSearchParams(window.location.search);
    const docType = urlParams.get('type') || 'mustaqil_ish';
    const userLang = urlParams.get('lang') || 'uz';

    document.getElementById('page-title').textContent =
        docType === 'referat' ? "📄 Referat Ma'lumotlari" : "📝 Mustaqil Ish Ma'lumotlari";

    const langSelect = document.getElementById('language');
    langSelect.value = ['ru','en'].includes(userLang) ? userLang : 'uz';

    // Saqlangan ma'lumotlarni yuklash
    try {
        const saved = JSON.parse(localStorage.getItem('essay_user_data') || '{}');
        if (saved.author) document.getElementById('author').value = saved.author;
        if (saved.university) document.getElementById('university').value = saved.university;
        if (saved.direction) document.getElementById('direction').value = saved.direction;
        if (saved.course) document.getElementById('course').value = saved.course;
        if (saved.subject) document.getElementById('subject').value = saved.subject;
        if (saved.pages) document.getElementById('pages').value = saved.pages;
    } catch(e) {}

    function toNameCase(str) {
        if (!str) return str;
        return str.split(' ').map(w => w ? w[0].toUpperCase() + w.slice(1).toLowerCase() : '').join(' ');
    }
    function toTitleCase(str) {
        return str ? str[0].toUpperCase() + str.slice(1) : str;
    }

    document.getElementById('save-btn').addEventListener('click', function() {
        const author = document.getElementById('author').value.trim();
        const university = document.getElementById('university').value.trim();
        const direction = document.getElementById('direction').value.trim();
        const course = document.getElementById('course').value;
        const subject = document.getElementById('subject').value.trim();
        const language = document.getElementById('language').value;
        const pagesVal = document.getElementById('pages').value;
        const [pageRange, price] = pagesVal.split('|');

        // LocalStorage ga saqlash
        try {
            localStorage.setItem('essay_user_data', JSON.stringify(
                { author, university, direction, course, subject, pages: pagesVal }
            ));
        } catch(e) {}

        const data = {
            type: docType,
            author: toNameCase(author),
            university: toTitleCase(university),
            direction: toTitleCase(direction),
            course: course || '',
            subject: toTitleCase(subject),
            language: language,
            page_range: pageRange,
            price: parseInt(price)
        };

        tg.sendData(JSON.stringify(data));
        tg.close();
    });
</script>
</body>
</html>
